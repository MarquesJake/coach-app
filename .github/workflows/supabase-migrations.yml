name: Supabase Migrations

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply migrations
        run: |
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            supabase db push --yes
          else
            supabase db push --yes --db-url "postgresql://postgres:${SUPABASE_DB_PASSWORD}@db.${SUPABASE_PROJECT_REF}.supabase.co:5432/postgres"
          fi

      - name: Install application dependencies
        run: npm ci

      - name: Run permission contract tests
        run: npm test

      - name: Run live cross-role club RLS tests
        if: env.SUPABASE_DB_PASSWORD != ''
        run: |
          export SUPABASE_DB_URL="postgresql://postgres:${SUPABASE_DB_PASSWORD}@db.${SUPABASE_PROJECT_REF}.supabase.co:5432/postgres"
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f supabase/tests/club_identity_rls.sql

      - name: Note live RLS test configuration
        if: env.SUPABASE_DB_PASSWORD == ''
        run: echo "::warning::Add SUPABASE_DB_PASSWORD to run the transaction-rollback RLS matrix in CI; static permission contracts passed and migrations are aligned."
